<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmat - CityScape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Email Confirmat</h1>

    <script>
        // Get token and type from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const type = urlParams.get('type');

        if (token && type === 'email') {
            // Call backend to confirm email
            const backendUrl = window.location.origin.includes('localhost')
                ? 'http://localhost:5002'
                : 'https://cityscape-backend.onrender.com';

            fetch(`${backendUrl}/api/auth/confirm-email`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ token: token })
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
